<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form đăng ký khách hàng</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f3f4f6; }
    .container { max-width: 700px; margin: auto; background: #ffffff; padding: 24px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; color: #111827; }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    input, select, button { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
    button { background: #2563eb; color: #fff; border: none; cursor: pointer; margin-top: 18px; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .note { margin-top: 16px; color: #4b5563; }
    .preview { margin-top: 24px; display: grid; gap: 16px; }
    .preview img { max-width: 100%; border: 1px solid #d1d5db; border-radius: 10px; }
    .status { margin-top: 18px; padding: 14px; border-radius: 10px; background: #eef2ff; color: #1e3a8a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Đăng ký thông tin khách hàng</h1>
    <form id="customerForm">
      <label for="fullName">Họ và tên</label>
      <input id="fullName" name="fullName" type="text" required placeholder="Nhập họ và tên" />

      <label for="gender">Giới tính</label>
      <select id="gender" name="gender" required>
        <option value="">Chọn giới tính</option>
        <option value="Nam">Nam</option>
        <option value="Nữ">Nữ</option>
        <option value="Khác">Khác</option>
      </select>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="example@domain.com" />

      <label for="phone">Số điện thoại</label>
      <input id="phone" name="phone" type="tel" required placeholder="Nhập số điện thoại" />

      <button id="submitBtn" type="submit">Gửi thông tin</button>
    </form>

    <div class="note">
      Sau khi gửi, hệ thống sẽ tạo giấy mời và mã QR, rồi gửi phản hồi đến email của bạn.
    </div>

    <div id="status" class="status" style="display:none"></div>

    <div class="preview">
      <div>
        <h2>Preview giấy mời</h2>
        <canvas id="invitationCanvas" width="900" height="550" style="width:100%;border:1px solid #d1d5db;border-radius:10px"></canvas>
      </div>
      <div>
        <h2>Preview QR code</h2>
        <canvas id="qrCanvas" width="400" height="400" style="width:100%;border:1px solid #d1d5db;border-radius:10px"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    var form = document.getElementById('customerForm');
    var submitBtn = document.getElementById('submitBtn');
    var statusBox = document.getElementById('status');
    var invitationCanvas = document.getElementById('invitationCanvas');
    var qrCanvas = document.getElementById('qrCanvas');
    var invitationCtx = invitationCanvas.getContext('2d');
    var qrCtx = qrCanvas.getContext('2d');

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      submitBtn.disabled = true;
      statusBox.style.display = 'block';
      statusBox.textContent = 'Đang xử lý...';

      var fullName = document.getElementById('fullName').value.trim();
      var gender = document.getElementById('gender').value;
      var email = document.getElementById('email').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var payload = 'Họ và tên: ' + fullName + '\nGiới tính: ' + gender + '\nEmail: ' + email + '\nSố điện thoại: ' + phone;

      buildInvitationImage(fullName, gender, email, phone);
      buildQrCode(payload)
        .then(function(qrDataUrl) {
          var invitationDataUrl = invitationCanvas.toDataURL('image/png');
          google.script.run.withSuccessHandler(function(result) {
            statusBox.textContent = result;
            submitBtn.disabled = false;
          }).withFailureHandler(function(error) {
            statusBox.textContent = 'Lỗi gửi email: ' + (error.message || error);
            submitBtn.disabled = false;
          }).sendEmailWithAttachments(fullName, gender, email, phone, invitationDataUrl, qrDataUrl);
        })
        .catch(function(err) {
          statusBox.textContent = 'Lỗi tạo QR code: ' + err;
          submitBtn.disabled = false;
        });
    });

    function buildInvitationImage(fullName, gender, email, phone) {
      var ctx = invitationCtx;
      ctx.clearRect(0, 0, invitationCanvas.width, invitationCanvas.height);
      ctx.fillStyle = '#1d4ed8';
      ctx.fillRect(0, 0, invitationCanvas.width, invitationCanvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(40, 40, invitationCanvas.width - 80, invitationCanvas.height - 80);

      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 42px Arial';
      ctx.fillText('GIẤY MỜI THAM DỰ', 80, 110);

      ctx.fillStyle = '#475569';
      ctx.font = '22px Arial';
      ctx.fillText('Kính mời:', 80, 180);
      ctx.font = 'bold 32px Arial';
      ctx.fillText(fullName || '[Tên khách hàng]', 80, 230);

      ctx.font = '20px Arial';
      ctx.fillStyle = '#334155';
      ctx.fillText('Giới tính: ' + gender, 80, 280);
      ctx.fillText('Email: ' + email, 80, 320);
      ctx.fillText('SĐT: ' + phone, 80, 360);

      ctx.fillStyle = '#1d4ed8';
      ctx.font = '20px Arial';
      ctx.fillText('Hẹn gặp bạn tại sự kiện của chúng tôi!', 80, 430);
      ctx.font = '18px Arial';
      ctx.fillText('Cảm ơn và chúc bạn một ngày tốt lành.', 80, 470);
    }

    function buildQrCode(text) {
      return QRCode.toCanvas(qrCanvas, text, {
        width: 380,
        margin: 2,
        color: {
          dark: '#0f172a',
          light: '#ffffff'
        }
      });
    }
  </script>
</body>
</html>
