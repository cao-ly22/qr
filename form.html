<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form đăng ký khách hàng</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f3f4f6; }
    .container { max-width: 800px; margin: auto; background: #ffffff; padding: 24px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    .header-row { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }
    .company-logo { width: 120px; border-radius: 10px; border: 1px solid #d1d5db; }
    h1 { margin: 0; color: #111827; font-size: 1.45rem; }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    input, select, button { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { background: #2563eb; color: #fff; border: none; cursor: pointer; margin-top: 18px; }
    button:disabled { background: #9ca3af; }
    .status { margin-top: 18px; padding: 14px; border-radius: 10px; background: #eef2ff; }
    canvas { width: 100%; border: 1px solid #d1d5db; border-radius: 10px; margin-top: 10px; }
  </style>
</head>

<body>
<div class="container">
  <h1>Đăng ký khách hàng</h1>

  <form id="customerForm">
    <label>Họ và tên</label>
    <input id="fullName" required>

    <label>Giới tính</label>
    <select id="gender" required>
      <option value="">Chọn</option>
      <option>Nam</option>
      <option>Nữ</option>
    </select>

    <label>Email</label>
    <input id="email" type="email" required>

    <label>SĐT</label>
    <input id="phone" required>

    <button id="submitBtn">Gửi</button>
  </form>

  <div id="status" class="status" style="display:none"></div>

  <canvas id="invitationCanvas" width="900" height="500"></canvas>
  <canvas id="qrCanvas" width="400" height="400"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<script>
const form = document.getElementById('customerForm');
const statusBox = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');

const invitationCanvas = document.getElementById('invitationCanvas');
const qrCanvas = document.getElementById('qrCanvas');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  submitBtn.disabled = true;
  statusBox.style.display = 'block';
  statusBox.innerText = 'Đang gửi...';

  const fullName = document.getElementById('fullName').value;
  const gender = document.getElementById('gender').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;

  drawInvitation(fullName, gender, email, phone);

  await QRCode.toCanvas(qrCanvas, `${fullName} - ${phone}`);

  const invitationImage = invitationCanvas.toDataURL();
  const qrImage = qrCanvas.toDataURL();

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fullName,
        gender,
        email,
        phone,
        invitationImage,
        invitationImageNew: qrImage
      })
    });

    const data = await res.json();

    statusBox.innerText = data.message || 'Gửi thành công';
  } catch (err) {
    statusBox.innerText = 'Lỗi: ' + err.message;
  }

  submitBtn.disabled = false;
});

function drawInvitation(name, gender, email, phone) {
  const ctx = invitationCanvas.getContext('2d');

  ctx.fillStyle = '#1e3a8a';
  ctx.fillRect(0, 0, 900, 500);

  ctx.fillStyle = '#fff';
  ctx.fillRect(40, 40, 820, 420);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 32px Arial';
  ctx.fillText('GIẤY MỜI', 350, 100);

  ctx.font = '20px Arial';
  ctx.fillText('Tên: ' + name, 80, 200);
  ctx.fillText('Giới tính: ' + gender, 80, 240);
  ctx.fillText('Email: ' + email, 80, 280);
  ctx.fillText('SĐT: ' + phone, 80, 320);
}
</script>
</body>
</html>
